slug: temporal-go-hands-on
title: Temporal Go SDK – Hands-On Lab
teaser: Build a durable order-fulfillment system with the Temporal Go SDK — child
  workflows, parallel fan-out, and local activities.
description: |-
  Progressive coding challenges using the Temporal Go SDK. Each challenge drops you into a
  partially-implemented order fulfillment workflow and asks you to fill in the missing pieces.

  **What you'll build:**

  - **Exercise 1 – Child Workflows:** Extract inventory reservation into a dedicated child workflow with its own history and retry boundary.
  - **Exercise 2 – Parallel Fan-Out + Local Activities:** Fan out warehouse checks concurrently with `workflow.Go()` goroutines, and move fast in-process steps to local activities.

  Each challenge includes a **Web UI** tab so you can watch your workflows execute in real time, and a **Solve** button if you get stuck.

  **Prerequisites:** Basic Go familiarity. No prior Temporal experience required — the exercises are self-guided.
